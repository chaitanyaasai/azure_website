<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Docker Azure App</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f5f7fa;
      }

      header {
        background: linear-gradient(135deg, #0078d4, #00c6ff);
        color: white;
        padding: 20px 40px;
        font-size: 24px;
        font-weight: bold;
      }

      .hero {
        text-align: center;
        padding: 100px 20px;
        background: linear-gradient(135deg, #0078d4, #00c6ff);
        color: white;
      }

      .hero h1 {
        font-size: 50px;
        margin-bottom: 10px;
      }

      .hero p {
        font-size: 18px;
        opacity: 0.9;
      }

      .btn {
        margin-top: 25px;
        padding: 14px 30px;
        background: white;
        color: #0078d4;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        background: #f0f0f0;
      }

      .features {
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 60px 20px;
        flex-wrap: wrap;
      }

      .card {
        background: white;
        padding: 25px;
        width: 250px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .card h3 {
        margin-bottom: 10px;
        color: #0078d4;
      }

      footer {
        text-align: center;
        padding: 20px;
        background: #222;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>🚀 My Azure Docker App</header>

    <section class="hero">
      <h1>Deploying with Docker + Azure</h1>
      <p>Learning real-world cloud deployment step by step</p>
      <button class="btn">Get Started</button>
    </section>

    <section class="features">
      <div class="card">
        <h3>⚡ Fast</h3>
        <p>Powered by Docker containers</p>
      </div>
      <div class="card">
        <h3>☁️ Cloud Ready</h3>
        <p>Deployed on Azure App Service</p>
      </div>
      <div class="card">
        <h3>🔒 Reliable</h3>
        <p>Scalable and production ready</p>
      </div>
    </section>

    <footer>© 2026 My Docker App</footer>
  </body>
</html>
