name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name cyborgwave

      - name: Build Docker image
        run: docker build --no-cache -t cyborgwave.azurecr.io/myapp:v2 .

      - name: Push image
        run: docker push cyborgwave.azurecr.io/myapp:v2
